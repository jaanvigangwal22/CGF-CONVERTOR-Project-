<!DOCTYPE html>
<html>

<head>
    <title>CFG Converter</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        textarea {
            width: 400px;
            height: 150px;
            margin-top: 20px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            cursor: pointer;
        }

        pre {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 20px;
        }
    </style>

</head>

<body>

<h1>CFG to CNF Converter 🚀</h1>

<form method="POST">

<textarea name="grammar" placeholder="Example:
S -> AB
A -> e
B -> b"></textarea>

<br>

<button type="submit">Convert</button>

</form>

{% if parsed %}
    <h2>Original Grammar:</h2>
    <pre>{{ parsed }}</pre>
{% endif %}

{% if no_epsilon %}
    <h2>After e (epsilon) Removal:</h2>
    <pre>{{ no_epsilon }}</pre>
{% endif %}

</body>

</html>
